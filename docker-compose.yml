services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-ddd-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - laravel-ddd
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:stable-alpine
    container_name: laravel-ddd-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-ddd
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: laravel-ddd-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laravel-ddd

  redis:
    image: redis:alpine
    container_name: laravel-ddd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - laravel-ddd

networks:
  laravel-ddd:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
